<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commande Confirmée - Le Petit Gourmet</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <main class="confirmation-container">
    
    <div class="confirmation-icon">✅</div>
    
    <h1 class="confirmation-title">Commande Confirmée!</h1>
    <p class="confirmation-number">N° #CMD-2024-0142</p>

    <div class="confirmation-details">
      <div class="confirmation-row">
        <span class="confirmation-icon-small">📧</span>
        <div class="confirmation-text">
          <div class="confirmation-label">Email de confirmation envoyé à</div>
          <div class="confirmation-value">jean.dupont@email.com</div>
        </div>
      </div>

      <div class="confirmation-row">
        <span class="confirmation-icon-small">⏱️</span>
        <div class="confirmation-text">
          <div class="confirmation-label">Temps de préparation estimé</div>
          <div class="confirmation-value">25 minutes</div>
        </div>
      </div>

      <div class="confirmation-row">
        <span class="confirmation-icon-small">📍</span>
        <div class="confirmation-text">
          <div class="confirmation-label">Heure de retrait prévue</div>
          <div class="confirmation-value">12h45</div>
        </div>
      </div>

      <div class="confirmation-row">
        <span class="confirmation-icon-small">📍</span>
        <div class="confirmation-text">
          <div class="confirmation-label">Adresse du restaurant</div>
          <div class="confirmation-value">123 Rue de la Gastronomie, 75001 Paris</div>
        </div>
      </div>
    </div>

    <button class="checkout-btn" onclick="window.location.href='historique.html'">
      SUIVRE MA COMMANDE
    </button>

    <button class="secondary-btn" onclick="window.location.href='index.html'">
      RETOURNER AU MENU
    </button>

  </main>

</body>
</html>
